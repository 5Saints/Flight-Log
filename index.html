<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flight Log">
<meta name="theme-color" content="#04080f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Flight Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap');
  :root {
    --bg:#04080f; --surface:#080e1a; --border:#1a2a3a;
    --accent:#00c8ff; --accent2:#e03030; --text:#d0e8f0; --muted:#4a6070;
    --land:#0d2230; --land-border:#1e3f55;
    --overlay-bg: rgba(4,8,15,0.78);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:'Barlow Condensed',sans-serif; height:100dvh; overflow:hidden; display:flex; flex-direction:column; }

  /* ── HEADER ── */
  #header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; min-height:48px; }
  #header h1 { font-family:'Share Tech Mono',monospace; font-size:clamp(11px,3vw,14px); letter-spacing:3px; color:var(--accent); }
  #year-selector { display:flex; align-items:center; gap:6px; }
  #year-selector select { background:var(--bg); color:var(--accent); border:1px solid var(--accent); padding:6px 10px; font-family:'Share Tech Mono',monospace; font-size:14px; border-radius:4px; outline:none; min-height:36px; }
  #add-year-btn { background:none; border:1px solid var(--accent); color:var(--accent); font-family:'Share Tech Mono',monospace; font-size:12px; padding:6px 10px; border-radius:4px; cursor:pointer; min-height:36px; min-width:44px; }

  /* ── SETTINGS ICON ── */
  #settings-btn { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:4px 8px; min-height:44px; min-width:44px; display:flex; align-items:center; justify-content:center; }
  #settings-btn:active { color:var(--accent); }

  /* ── MAP ── */
  #map-container { flex:1; position:relative; overflow:hidden; background:#020a12; }
  #map-svg { width:100%; height:100%; display:block; }
  .state { fill:var(--land); stroke:var(--land-border); stroke-width:0.6; stroke-linejoin:round; }
  .flight-arc { fill:none; stroke:var(--accent); stroke-width:2; stroke-linecap:round; }
  .static-arc { fill:none; stroke:var(--accent); stroke-width:1.2; stroke-linecap:round; opacity:0.25; }
  .visited-dot { fill:var(--accent); opacity:0.9; }
  /* Hide labels on small screens — dots only below 400px width */
  .visited-label { font-family:'Share Tech Mono',monospace; font-size:7px; fill:var(--accent); opacity:0.8; letter-spacing:0.5px; pointer-events:none; }
  @media (max-width:400px) { .visited-label { display:none; } }

  /* ── OVERLAYS ── */
  #mileage-overlay { position:absolute; top:12px; left:12px; pointer-events:none; background:var(--overlay-bg); border:1px solid var(--border); border-radius:6px; padding:10px 14px; }
  .mile-label { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:2px; }
  .mile-count { font-family:'Share Tech Mono',monospace; font-size:clamp(20px,6vw,30px); color:var(--accent); line-height:1; text-shadow:0 0 16px rgba(0,200,255,0.5); }
  .stats-val { font-family:'Share Tech Mono',monospace; font-size:clamp(11px,3vw,13px); color:#8ab4c4; letter-spacing:1px; margin-top:3px; }
  #date-overlay { position:absolute; top:12px; right:12px; text-align:right; pointer-events:none; background:var(--overlay-bg); border:1px solid var(--border); border-radius:6px; padding:10px 14px; }
  #flight-date { font-family:'Share Tech Mono',monospace; font-size:clamp(11px,3vw,13px); color:var(--accent); letter-spacing:2px; }
  #flight-label { font-family:'Share Tech Mono',monospace; font-size:clamp(11px,3vw,13px); color:var(--accent); letter-spacing:2px; margin-top:4px; min-height:0; }

  /* ── PLAYBACK BAR ── */
  #playback-bar { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(4,8,15,0.96)); padding:8px 16px calc(12px + var(--safe-bottom)); display:flex; align-items:center; gap:12px; }
  #play-btn { background:var(--accent); color:var(--bg); border:none; width:48px; height:48px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; touch-action:manipulation; }
  #play-btn:disabled { background:var(--muted); }
  #speed-label { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:1px; flex-shrink:0; }
  #speed-slider { flex:1; -webkit-appearance:none; height:4px; background:var(--border); outline:none; border-radius:4px; }
  #speed-slider::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:var(--accent); cursor:pointer; }

  /* ── DRAWER ── */
  #drawer-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:40; }
  #drawer-overlay.open { display:block; }
  #drawer { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); border-radius:16px 16px 0 0; z-index:50; transform:translateY(100%); transition:transform 0.32s cubic-bezier(0.32,0,0,1); max-height:85dvh; display:flex; flex-direction:column; padding-bottom:var(--safe-bottom); }
  #drawer.open { transform:translateY(0); }
  #drawer-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:12px auto 4px; flex-shrink:0; }
  #drawer-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
  .drawer-tab { flex:1; padding:12px; background:none; border:none; color:var(--muted); font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:600; letter-spacing:2px; text-transform:uppercase; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; }
  .drawer-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  #drawer-content { overflow-y:auto; flex:1; }

  /* ── ADD FLIGHT PANEL ── */
  #panel-add { padding:16px; display:none; flex-direction:column; gap:14px; }
  #panel-add.active { display:flex; }
  .form-row { display:flex; gap:10px; }
  .form-group { flex:1; display:flex; flex-direction:column; gap:6px; }
  .form-group label { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:2px; }
  .form-group input { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:12px 12px; font-family:'Share Tech Mono',monospace; font-size:16px; text-transform:uppercase; letter-spacing:2px; border-radius:4px; outline:none; width:100%; transition:border-color 0.2s; min-height:48px; }
  .form-group input:focus { border-color:var(--accent); }
  .form-group input.error { border-color:#ff4444; }
  #add-flight-btn { background:var(--accent); color:var(--bg); border:none; padding:14px; font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; letter-spacing:3px; text-transform:uppercase; cursor:pointer; border-radius:6px; min-height:52px; touch-action:manipulation; }
  #form-error { font-family:'Share Tech Mono',monospace; font-size:11px; color:#ff4444; letter-spacing:1px; min-height:16px; }

  /* ── FLIGHT LIST ── */
  #panel-list { display:none; flex-direction:column; }
  #panel-list.active { display:flex; }
  .flight-item { display:flex; align-items:center; padding:13px 16px; border-bottom:1px solid var(--border); gap:12px; min-height:56px; }
  .flight-route { font-family:'Share Tech Mono',monospace; font-size:14px; color:var(--accent); letter-spacing:2px; flex:1; }
  .flight-meta { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
  .flight-date-item { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); }
  .flight-miles { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--accent2); }
  .empty-state { padding:32px 16px; text-align:center; font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:2px; }
  .delete-btn { background:none; border:1px solid #442222; color:#884444; font-size:14px; width:36px; height:36px; border-radius:4px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; touch-action:manipulation; }
  .delete-btn:active { background:#3a1010; border-color:#e03030; color:#e03030; }

  /* ── SETTINGS DRAWER ── */
  #settings-panel { padding:16px; display:flex; flex-direction:column; gap:12px; }
  .settings-row { display:flex; gap:8px; }
  .settings-btn { flex:1; background:none; border:1px solid var(--border); color:var(--muted); font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:1px; padding:12px 8px; border-radius:4px; cursor:pointer; transition:all 0.2s; min-height:48px; touch-action:manipulation; }
  .settings-btn:active { border-color:var(--accent); color:var(--accent); }

  /* ── TOAST ── */
  #toast { position:fixed; bottom:calc(80px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface); border:1px solid var(--accent); color:var(--accent); font-family:'Share Tech Mono',monospace; font-size:12px; letter-spacing:1px; padding:10px 20px; border-radius:20px; opacity:0; transition:opacity 0.3s, transform 0.3s; pointer-events:none; white-space:nowrap; z-index:100; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="header">
  <h1>Flight Log</h1>
  <div id="year-selector">
    <select id="year-select"></select>
    <button id="add-year-btn" title="Add year">+YR</button>
  </div>
  <button id="settings-btn" title="Settings">&#9881;</button>
</div>

<div id="map-container">
  <svg id="map-svg" viewBox="0 0 960 580" preserveAspectRatio="xMidYMid meet">
    <rect width="960" height="580" fill="#020a12"/>
    <g id="states-layer"></g>
    <g id="arcs-layer"></g>
    <g id="airports-layer"></g>
    <circle id="plane" r="5" fill="white" style="display:none;filter:drop-shadow(0 0 5px white)"/>
  </svg>
  <div id="mileage-overlay">
    <div class="mile-label">Total Miles</div>
    <div class="mile-count" id="mile-count">0</div>
    <div class="stats-val" id="flight-count"></div>
    <div class="stats-val" id="city-count"></div>
    <div class="stats-val" id="time-count"></div>
  </div>
  <div id="date-overlay">
    <div id="flight-date"></div>
    <div id="flight-label"></div>
  </div>
  <div id="playback-bar">
    <button id="play-btn">&#9654;</button>
    <span id="speed-label">SPEED</span>
    <input type="range" id="speed-slider" min="1" max="5" value="3">
  </div>
</div>

<!-- Bottom drawer -->
<div id="drawer-overlay"></div>
<div id="drawer">
  <div id="drawer-handle"></div>
  <div id="drawer-tabs">
    <button class="drawer-tab active" data-tab="add">+ Add Flight</button>
    <button class="drawer-tab" data-tab="list">All Flights</button>
  </div>
  <div id="drawer-content">
    <div id="panel-add" class="active">
      <div class="form-row">
        <div class="form-group">
          <label>From</label>
          <input type="text" id="input-from" maxlength="3" placeholder="DFW"
            autocomplete="off" autocorrect="off" spellcheck="false" inputmode="text">
        </div>
        <div class="form-group">
          <label>To</label>
          <input type="text" id="input-to" maxlength="3" placeholder="LAX"
            autocomplete="off" autocorrect="off" spellcheck="false" inputmode="text">
        </div>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="input-date">
      </div>
      <div id="form-error"></div>
      <button id="add-flight-btn">Add Flight</button>
    </div>
    <div id="panel-list">
      <div class="empty-state" id="empty-state">NO FLIGHTS LOGGED</div>
    </div>
  </div>
</div>

<!-- Settings drawer -->
<div id="settings-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:60;"></div>
<div id="settings-drawer" style="position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);border-radius:16px 16px 0 0;z-index:70;transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.32,0,0,1);padding-bottom:var(--safe-bottom);">
  <div id="drawer-handle" style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 8px;"></div>
  <div id="settings-panel">
    <div class="settings-row">
      <button class="settings-btn" id="export-btn">&#x2193; EXPORT JSON</button>
      <label class="settings-btn" style="text-align:center;cursor:pointer;">&#x2191; IMPORT<input type="file" id="import-input" accept=".json,.xlsx" style="display:none"></label>
    </div>
  </div>
</div>

<div id="toast"></div>

// ─── STORAGE ────────────────────────────────────────────────────────────────
function loadFlights(){try{return JSON.parse(localStorage.getItem('flightlog_v3')||'{}')}catch(e){return{}}}
function saveFlights(d){localStorage.setItem('flightlog_v3',JSON.stringify(d))}
let allFlights=loadFlights();
function getYearFlights(y){return(allFlights[y]||[]).slice().sort((a,b)=>a.date.localeCompare(b.date))}

// ─── YEAR ───────────────────────────────────────────────────────────────────
const yearSelect=document.getElementById('year-select');
let currentYear=new Date().getFullYear();
function populateYears(){
  const years=new Set([currentYear,currentYear-1,currentYear+1]);
  Object.keys(allFlights).forEach(y=>years.add(parseInt(y)));
  yearSelect.innerHTML=Array.from(years).sort((a,b)=>b-a).map(y=>`<option value="${y}"${y===currentYear?' selected':''}>${y}</option>`).join('');
}
yearSelect.addEventListener('change',()=>{
  currentYear=parseInt(yearSelect.value);
  updateMileCount(getYearFlights(currentYear).reduce((s,f)=>s+f.miles,0));
  renderList();
  renderVisitedAirports();
});

// ─── DISTANCE ───────────────────────────────────────────────────────────────
function getMiles(a,b){
  const R=3958.8,r=Math.PI/180;
  const dLat=(b.lat-a.lat)*r,dLon=(b.lon-a.lon)*r;
  const h=Math.sin(dLat/2)**2+Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLon/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h)));
}

// ─── MAP ────────────────────────────────────────────────────────────────────
const SVG_NS='http://www.w3.org/2000/svg';
const statesLayer=document.getElementById('states-layer');
const arcsLayer=document.getElementById('arcs-layer');
const airportsLayer=document.getElementById('airports-layer');
const planeDot=document.getElementById('plane');

function drawMap(){
  STATE_PATHS.forEach(d=>{
    const p=document.createElementNS(SVG_NS,'path');
    p.setAttribute('d',d);
    p.setAttribute('class','state');
    statesLayer.appendChild(p);
  });
}

// Collect all visited airport codes across ALL years
function getVisitedCodes(){
  const codes=new Set();
  getYearFlights(currentYear).forEach(f=>{codes.add(f.from);codes.add(f.to);});
  return codes;
}

function addAirportMarker(code){
  const ap=AIRPORTS[code];
  if(!ap || code==='DFW') return;
  if(airportsLayer.querySelector(`[data-code="${code}"]`)) return; // already shown
  const dot=document.createElementNS(SVG_NS,'circle');
  dot.setAttribute('cx',ap.x); dot.setAttribute('cy',ap.y);
  dot.setAttribute('r','3'); dot.setAttribute('class','visited-dot');
  dot.setAttribute('data-code',code);
  airportsLayer.appendChild(dot);
  const label=document.createElementNS(SVG_NS,'text');
  const nearRight=ap.x>820, nearTop=ap.y<80;
  label.setAttribute('x', nearRight ? ap.x-4 : ap.x+4);
  label.setAttribute('y', nearTop   ? ap.y+12 : ap.y-5);
  label.setAttribute('class','visited-label');
  label.setAttribute('text-anchor', nearRight ? 'end' : 'start');
  label.setAttribute('data-code',code);
  label.textContent=code;
  airportsLayer.appendChild(label);
}

function renderVisitedAirports(){
  while(airportsLayer.firstChild) airportsLayer.removeChild(airportsLayer.firstChild);
  drawHomeMarker();
  if(!playbackActive){
    getVisitedCodes().forEach(code=>addAirportMarker(code));
  }
  // During playback, markers are revealed incrementally as each flight completes
}

function drawHomeMarker(){
  const hw=AIRPORTS['DFW'];
  const ring=document.createElementNS(SVG_NS,'circle');
  ring.setAttribute('cx',hw.x); ring.setAttribute('cy',hw.y);
  ring.setAttribute('r','7'); ring.setAttribute('fill','none');
  ring.setAttribute('stroke','#e03030'); ring.setAttribute('stroke-width','1.5');
  airportsLayer.appendChild(ring);
  const dot=document.createElementNS(SVG_NS,'circle');
  dot.setAttribute('cx',hw.x); dot.setAttribute('cy',hw.y);
  dot.setAttribute('r','3.5'); dot.setAttribute('fill','#e03030');
  airportsLayer.appendChild(dot);
  const label=document.createElementNS(SVG_NS,'text');
  label.setAttribute('x',hw.x+5); label.setAttribute('y',hw.y-8);
  label.setAttribute('class','visited-label');
  label.setAttribute('fill','#e03030');
  label.textContent='DFW';
  airportsLayer.appendChild(label);
}

// ─── ARC ANIMATION ──────────────────────────────────────────────────────────
let currentArc=null, animFrame=null;

function clearArc(){
  if(currentArc){arcsLayer.removeChild(currentArc);currentArc=null;}
  planeDot.style.display='none';
}

function arcCP(x1,y1,x2,y2){
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const dx=x2-x1, dy=y2-y1;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const lift=dist*0.28;
  const nx=-dy/dist, ny=dx/dist;
  const sign=ny>0?-1:1;
  return{cx:mx+nx*lift*sign, cy:my+ny*lift*sign};
}

function bezierPt(x1,y1,cx,cy,x2,y2,t){
  const m=1-t;
  return{x:m*m*x1+2*m*t*cx+t*t*x2, y:m*m*y1+2*m*t*cy+t*t*y2};
}

function animateFlight(fromCode,toCode,onProgress,onComplete){
  clearArc();
  const from=AIRPORTS[fromCode], to=AIRPORTS[toCode];
  if(!from||!to){onComplete();return;}
  const{cx,cy}=arcCP(from.x,from.y,to.x,to.y);
  currentArc=document.createElementNS(SVG_NS,'path');
  currentArc.setAttribute('class','flight-arc');
  currentArc.setAttribute('d',`M${from.x},${from.y} Q${cx},${cy} ${to.x},${to.y}`);
  arcsLayer.appendChild(currentArc);
  const len=currentArc.getTotalLength();
  currentArc.setAttribute('stroke-dasharray',len);
  currentArc.setAttribute('stroke-dashoffset',len);
  planeDot.style.display='block';
  const spd=parseInt(document.getElementById('speed-slider').value);
  const dur=2800/spd;
  let t0=null;
  function step(ts){
    if(!t0)t0=ts;
    const t=Math.min((ts-t0)/dur,1);
    currentArc.setAttribute('stroke-dashoffset',len*(1-t));
    const pt=bezierPt(from.x,from.y,cx,cy,to.x,to.y,t);
    planeDot.setAttribute('cx',pt.x); planeDot.setAttribute('cy',pt.y);
    onProgress(t);
    if(t<1){animFrame=requestAnimationFrame(step);}else{onComplete();}
  }
  animFrame=requestAnimationFrame(step);
}

// ─── MILEAGE ────────────────────────────────────────────────────────────────
let displayedMiles=0;
function updateMileCount(v, pbFlights){
  // pbFlights: optional array of only completed flights (used during playback)
  displayedMiles=v;
  document.getElementById('mile-count').textContent=Math.round(v).toLocaleString();
  const flights = pbFlights !== undefined ? pbFlights : getYearFlights(currentYear);
  const fc=document.getElementById('flight-count');
  if(fc) fc.textContent=flights.length ? `${flights.length} flight${flights.length===1?'':'s'}` : '';
  const cc=document.getElementById('city-count');
  if(cc){
    const unique=new Set();
    flights.forEach(f=>{unique.add(f.from);unique.add(f.to);});
    cc.textContent=unique.size ? `${unique.size} airport${unique.size===1?'':'s'}` : '';
  }
  const tc=document.getElementById('time-count');
  if(tc){
    const totalMiles=flights.reduce((s,f)=>s+f.miles,0);
    const hrs=(totalMiles/500)+(flights.length*0.9);
    if(hrs>0){
      tc.textContent=`~${Math.ceil(hrs)}h in air`;
    } else { tc.textContent=''; }
  }
}

// ─── PLAYBACK ───────────────────────────────────────────────────────────────
// ── Playback state (module-level so pause/resume can access) ────────────────
let playbackActive=false;
let playbackPaused=false;
let pb_idx=0, pb_acc=0, pb_flights=[];
const playbackArcs=[];

function clearPlaybackArcs(){
  playbackArcs.forEach(el=>{if(el.parentNode)el.parentNode.removeChild(el);});
  playbackArcs.length=0;
}

function freezeArc(){
  if(currentArc){
    currentArc.setAttribute('class','static-arc');
    currentArc.removeAttribute('stroke-dasharray');
    currentArc.removeAttribute('stroke-dashoffset');
    playbackArcs.push(currentArc);
    currentArc=null;
  }
}

function setPlayBtn(state){
  const btn=document.getElementById('play-btn');
  if(state==='play')  { btn.innerHTML='&#9654;'; btn.disabled=false; }
  if(state==='pause') { btn.innerHTML='&#10074;&#10074;'; btn.disabled=false; }
  if(state==='done')  { btn.innerHTML='&#9654;'; btn.disabled=false; }
}

function pbPlayFlight(){
  if(pb_idx >= pb_flights.length){
    playbackActive=false;
    playbackPaused=false;
    setPlayBtn('done');
    document.getElementById('flight-label').textContent='';
    document.getElementById('flight-date').textContent='';
    planeDot.style.display='none';
    updateMileCount(pb_acc);
    setTimeout(()=>{ clearPlaybackArcs(); }, 2200);
    return;
  }
  const f=pb_flights[pb_idx];
  document.getElementById('flight-label').textContent=`${f.from} \u2192 ${f.to}`;
  document.getElementById('flight-date').textContent=formatDate(f.date);
  // Reveal both airports before the arc begins drawing
  addAirportMarker(f.from);
  addAirportMarker(f.to);
  animateFlight(f.from, f.to,
    t=>{ document.getElementById('mile-count').textContent=Math.round(pb_acc+f.miles*t).toLocaleString(); },
    ()=>{
      pb_acc+=f.miles; displayedMiles=pb_acc; pb_idx++;
      freezeArc();
      // Update flight count, airports, and hours with completed flights so far
      updateMileCount(pb_acc, pb_flights.slice(0, pb_idx));
      const delay=320/parseInt(document.getElementById('speed-slider').value);
      if(playbackPaused){
        // Between flights — button click will call pbPlayFlight directly
      } else {
        setTimeout(pbPlayFlight, delay);
      }
    }
  );
}

document.getElementById('play-btn').addEventListener('click',()=>{
  if(!playbackActive){
    // Start
    pb_flights=getYearFlights(currentYear);
    if(!pb_flights.length) return;
    pb_idx=0; pb_acc=0;
    playbackActive=true;
    playbackPaused=false;
    setPlayBtn('pause');
    clearPlaybackArcs();
    while(airportsLayer.firstChild) airportsLayer.removeChild(airportsLayer.firstChild);
    drawHomeMarker();
    updateMileCount(0, []);
    const fc=document.getElementById('flight-count');
    if(fc) fc.textContent='';
    pbPlayFlight();

  } else if(!playbackPaused){
    // Pause
    playbackPaused=true;
    if(animFrame){ cancelAnimationFrame(animFrame); animFrame=null; }
    // If paused mid-arc, roll back index so resume replays that flight cleanly
    if(pb_idx < pb_flights.length){
      pb_acc -= 0; // acc not yet incremented mid-arc, no adjustment needed
      clearArc();
    }
    setPlayBtn('play');

  } else {
    // Resume
    playbackPaused=false;
    setPlayBtn('pause');
    pbPlayFlight();
  }
});

// ─── FORM ───────────────────────────────────────────────────────────────────
function addFlight(){
  const from=document.getElementById('input-from').value.trim().toUpperCase();
  const to=document.getElementById('input-to').value.trim().toUpperCase();
  const date=document.getElementById('input-date').value;
  const err=document.getElementById('form-error');
  err.textContent='';
  ['input-from','input-to'].forEach(id=>document.getElementById(id).classList.remove('error'));
  if(!AIRPORTS[from]){err.textContent=`Unknown airport: ${from||'FROM'}`;document.getElementById('input-from').classList.add('error');return;}
  if(!AIRPORTS[to]){err.textContent=`Unknown airport: ${to||'TO'}`;document.getElementById('input-to').classList.add('error');return;}
  if(!date){err.textContent='Date required';return;}
  if(from===to){err.textContent='Origin and destination must differ';return;}
  const year=parseInt(date.split('-')[0]);
  const miles=getMiles(AIRPORTS[from],AIRPORTS[to]);
  if(!allFlights[year])allFlights[year]=[];
  allFlights[year].push({from,to,date,miles});
  saveFlights(allFlights);
  if(!Array.from(yearSelect.options).some(o=>parseInt(o.value)===year)){populateYears();yearSelect.value=year;currentYear=year;}
  if(year===currentYear){updateMileCount(getYearFlights(currentYear).reduce((s,f)=>s+f.miles,0));renderList();}
  renderVisitedAirports();
  document.getElementById('input-from').value='';
  document.getElementById('input-to').value='';
  document.getElementById('input-date').value='';
  showToast('Flight added');
  closeDrawer();
}
document.getElementById('add-flight-btn').addEventListener('click',addFlight);
['input-from','input-to'].forEach(id=>document.getElementById(id).addEventListener('input',e=>e.target.value=e.target.value.toUpperCase()));
document.getElementById('input-from').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('input-to').focus();});
document.getElementById('input-to').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('input-date').focus();});
document.getElementById('input-date').addEventListener('keydown',e=>{if(e.key==='Enter')addFlight();});

// ─── LIST ───────────────────────────────────────────────────────────────────
function formatDate(d){const[y,m,day]=d.split('-');return['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][parseInt(m)-1]+' '+day;}
function deleteFlight(year, idx){
  allFlights[year].splice(idx,1);
  if(!allFlights[year].length) delete allFlights[year];
  saveFlights(allFlights);
  updateMileCount(getYearFlights(currentYear).reduce((s,f)=>s+f.miles,0));
  renderList();
  renderVisitedAirports();
}

function renderList(){
  const panel=document.getElementById('panel-list');
  Array.from(panel.querySelectorAll('.flight-item')).forEach(el=>el.remove());
  const flights=getYearFlights(currentYear);
  document.getElementById('empty-state').style.display=flights.length?'none':'block';
  // Map sorted flights back to original indices for deletion
  const raw=allFlights[currentYear]||[];
  flights.forEach(f=>{
    const rawIdx=raw.findIndex(r=>r.from===f.from&&r.to===f.to&&r.date===f.date);
    const div=document.createElement('div');
    div.className='flight-item';
    div.innerHTML=`
      <div class="flight-route">${f.from} &rarr; ${f.to}</div>
      <div class="flight-meta">
        <div class="flight-date-item">${formatDate(f.date)}</div>
        <div class="flight-miles">${f.miles.toLocaleString()} mi</div>
      </div>
      <button class="delete-btn" title="Delete">&#x2715;</button>`;
    div.querySelector('.delete-btn').addEventListener('click',()=>deleteFlight(currentYear,rawIdx));
    panel.appendChild(div);
  });
}

// ─── DRAWER ─────────────────────────────────────────────────────────────────
const drawer = document.getElementById('drawer');
const drawerOverlay = document.getElementById('drawer-overlay');
let drawerOpen = false;
let activeTab = 'add';

function openDrawer(tab) {
  if(tab && tab !== activeTab) switchDrawerTab(tab);
  drawer.classList.add('open');
  drawerOverlay.classList.add('open');
  drawerOpen = true;
}

function closeDrawer() {
  drawer.classList.remove('open');
  drawerOverlay.classList.remove('open');
  drawerOpen = false;
}

function switchDrawerTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.drawer-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('#panel-add, #panel-list').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
  if(tab === 'list') renderList();
}

drawerOverlay.addEventListener('click', closeDrawer);

document.querySelectorAll('.drawer-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    if(btn.dataset.tab === activeTab && drawerOpen) { closeDrawer(); return; }
    openDrawer(btn.dataset.tab);
  });
});

document.getElementById('add-flight-btn') && null; // handled below

// ─── ADD YEAR ────────────────────────────────────────────────────────────────
function showToast(msg, duration=2500){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration);
}

document.getElementById('add-year-btn').addEventListener('click',()=>{
  const y=parseInt(prompt('Enter year to add:'));
  if(!y||isNaN(y)||y<1900||y>2100) return;
  if(!allFlights[y]) allFlights[y]=[];
  saveFlights(allFlights);
  populateYears();
  yearSelect.value=y;
  currentYear=y;
  updateMileCount(0);

document.getElementById('export-btn').addEventListener('click',()=>{

// ─── IMPORT ──────────────────────────────────────────────────────────────────
document.getElementById('import-input').addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file) return;
  const isXlsx = file.name.toLowerCase().endsWith('.xlsx');
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      if(isXlsx) {
        const run = () => importAAdvantage(ev.target.result);
        if(typeof XLSX === 'undefined') {
          showToast('Loading Excel support…', 1500);
          const s=document.createElement('script');
          s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
          s.onload=run; document.head.appendChild(s);
        } else { run(); }
      } else {
        importJSON(ev.target.result);
      }
    } catch(err) { showToast('Import failed: ' + err.message, 3500); }
  };
  if(isXlsx) reader.readAsArrayBuffer(file);
  else reader.readAsText(file);
  e.target.value='';
});

function importJSON(text) {
  const data = JSON.parse(text);
  mergeFlights(data);
}

function importAAdvantage(buffer) {
  const wb = XLSX.read(buffer, {type:'arraybuffer', cellDates:true});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false});

  // Detect format: AAdvantage has 'Activity Date' + 'Type'; template has 'FROM' + 'TO' + 'DATE'
  let headerIdx = rows.findIndex(r => r.some(c => String(c).trim() === 'Activity Date'));
  const isTemplate = headerIdx === -1;

  if(isTemplate) {
    // Find header row containing FROM and TO columns
    headerIdx = rows.findIndex(r =>
      r.some(c => String(c||'').trim().toUpperCase() === 'FROM') &&
      r.some(c => String(c||'').trim().toUpperCase() === 'TO')
    );
    if(headerIdx === -1) throw new Error('Unrecognized format. Use the Flight Log template or an AAdvantage Activity export.');
    importTemplate(rows, headerIdx);
  } else {
    importAAdvantageRows(rows, headerIdx);
  }
}

function importTemplate(rows, headerIdx) {
  const headers = rows[headerIdx].map(h => String(h||'').trim().toUpperCase());
  const fromCol  = headers.findIndex(h => h === 'FROM');
  const toCol    = headers.findIndex(h => h === 'TO');
  const dateCol  = headers.findIndex(h => h === 'DATE');
  const milesCol = headers.findIndex(h => h.includes('MILES'));

  const importData = {};
  let imported = 0, skipped = 0, unknown = 0;

  for(let i = headerIdx+1; i < rows.length; i++) {
    const row = rows[i];
    const from = String(row[fromCol]||'').trim().toUpperCase().replace(/[^A-Z]/g,'');
    const to   = String(row[toCol]||'').trim().toUpperCase().replace(/[^A-Z]/g,'');
    if(!from || !to || from.length !== 3 || to.length !== 3) continue;

    if(!AIRPORTS[from] || !AIRPORTS[to]) { unknown++; continue; }

    // Date may be a full ISO string or "2025-01-06 00:00:00" from Excel
    const rawDate = String(row[dateCol]||'').trim();
    const cleanDate = rawDate.replace(/[T ]\d{2}:\d{2}:\d{2}.*$/, '').trim();
    const d = new Date(cleanDate);
    if(isNaN(d.getTime())) { skipped++; continue; }
    const dateStr = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const year = d.getFullYear();

    // Use provided miles if valid, otherwise calculate
    let miles = milesCol >= 0 ? parseInt(row[milesCol]) : NaN;
    if(isNaN(miles) || miles <= 0) miles = getMiles(AIRPORTS[from], AIRPORTS[to]);

    if(!importData[year]) importData[year] = [];
    importData[year].push({from, to, date:dateStr, miles});
    imported++;
  }

  if(imported === 0) {
    showToast(unknown > 0 ? `No flights found (${unknown} unknown codes)` : 'No valid flights found');
    return;
  }
  mergeFlights(importData);
  let msg = `Imported ${imported} flight${imported===1?'':'s'}.`;
  if(unknown > 0) msg += `\n${unknown} rows skipped — airport codes not in database.`;
  alert(msg);
}

function importAAdvantageRows(rows, headerIdx) {
  const headers = rows[headerIdx].map(h => String(h||'').trim());
  const dateCol  = headers.findIndex(h => h === 'Activity Date');
  const descCol  = headers.findIndex(h => h === 'Description');
  const typeCol  = headers.findIndex(h => h === 'Type');

  const importData = {};
  let imported = 0, skipped = 0, unknown = 0;

  for(let i = headerIdx+1; i < rows.length; i++) {
    const row = rows[i];
    const type = String(row[typeCol]||'').trim();
    if(type !== 'Flights') continue;

    const desc = String(row[descCol]||'').trim();
    const match = desc.match(/^([A-Z]{3})-([A-Z]{3})$/);
    if(!match) { skipped++; continue; }

    const from = match[1], to = match[2];
    if(!AIRPORTS[from] || !AIRPORTS[to]) { unknown++; continue; }

    const rawDate = String(row[dateCol]||'').trim();
    const d = new Date(rawDate);
    if(isNaN(d.getTime())) { skipped++; continue; }
    const dateStr = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const year = d.getFullYear();

    const miles = getMiles(AIRPORTS[from], AIRPORTS[to]);
    if(!importData[year]) importData[year] = [];
    importData[year].push({from, to, date:dateStr, miles});
    imported++;
  }

  if(imported === 0) {
    showToast(unknown > 0 ? `No flights found (${unknown} unknown codes)` : 'No valid flights found');
    return;
  }
  mergeFlights(importData);
  let msg = `Imported ${imported} flight${imported===1?'':'s'}`;
  if(unknown > 0) msg += ` (${unknown} skipped)`;
  showToast(msg);
}

function mergeFlights(data) {
  Object.keys(data).forEach(y => {
    if(!allFlights[y]) allFlights[y] = [];
    data[y].forEach(f => {
      const exists = allFlights[y].some(r => r.from===f.from && r.to===f.to && r.date===f.date);
      if(!exists) allFlights[y].push(f);
    });
  });
  saveFlights(allFlights);
  populateYears();
  currentYear = parseInt(yearSelect.value);
  updateMileCount(getYearFlights(currentYear).reduce((s,f)=>s+f.miles,0));
  renderList();
  renderVisitedAirports();
  document.getElementById('settings-drawer').style.transform='translateY(100%)';
  document.getElementById('settings-overlay').style.display='none';
}

drawMap();

renderVisitedAirports();
